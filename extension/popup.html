<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projecteur</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 220px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f10;
      color: #e8e8e8;
      padding: 14px 12px;
    }

    h1 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      text-align: left;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-add {
      background: #1a2e1a;
      color: #6ddb6d;
      margin-bottom: 7px;
    }
    .btn-add:hover:not(:disabled) { background: #1f3a1f; }

    .btn-clear {
      background: #2e1a1a;
      color: #db6d6d;
    }
    .btn-clear:hover:not(:disabled) { background: #3a1f1f; }

    .icon { font-size: 15px; flex-shrink: 0; }

    #status {
      margin-top: 10px;
      font-size: 11px;
      color: #888;
      min-height: 16px;
      text-align: center;
      transition: color 0.2s;
    }
    #status.ok  { color: #6ddb6d; }
    #status.err { color: #db6d6d; }
  </style>
</head>
<body>
  <h1>Projecteur</h1>

  <button class="btn btn-add" id="btnAdd">
    <span class="icon">📎</span> Ajouter ce lien
  </button>

  <button class="btn btn-clear" id="btnClear">
    <span class="icon">🗑️</span> Vider les liens
  </button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
